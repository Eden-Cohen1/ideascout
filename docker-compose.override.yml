# Dev overrides (auto-merged with docker-compose.yml on `docker compose up`).
# Exposes Postgres/Redis to the host so you can run apps locally against them.
# Source bind-mounts + hot-reload for api/web/worker are finalized in the Docker milestone.

services:
  postgres:
    ports:
      - '5432:5432'

  redis:
    ports:
      - '6379:6379'

  api:
    ports:
      - '3000:3000'

  web:
    ports:
      - '8080:80'
