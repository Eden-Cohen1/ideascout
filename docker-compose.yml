# Base stack. Dev overrides are auto-merged from docker-compose.override.yml.
# For prod: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# NOTE: api/web images build successfully once their apps are implemented
# (finalized in the Docker milestone). Postgres + Redis are usable now.

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ideascout}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ideascout}
      POSTGRES_DB: ${POSTGRES_DB:-ideascout}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-ideascout}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    command: ['redis-server', '/usr/local/etc/redis/redis.conf']
    volumes:
      - ./infra/docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: ['node', 'dist/worker.js']
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      api:
        condition: service_started

volumes:
  pgdata:
  redisdata:
