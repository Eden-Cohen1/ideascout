# Prod overrides: built images only, restart policies, no exposed DB/Redis ports.
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  postgres:
    restart: unless-stopped

  redis:
    restart: unless-stopped

  api:
    restart: unless-stopped

  worker:
    restart: unless-stopped

  web:
    restart: unless-stopped
    ports:
      - '80:80'
